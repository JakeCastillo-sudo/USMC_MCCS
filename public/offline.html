<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0C2340">
  <title>MCCS Camp Pendleton — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0C2340;
      color: white;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.2rem;
    }
    .sub {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #C9A84C;
      font-weight: 700;
      margin-bottom: 2.5rem;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      opacity: 0.75;
    }
    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.65;
      max-width: 280px;
      margin-bottom: 2rem;
    }
    .btn {
      background: #C8102E;
      color: white;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 2.5rem;
      border-radius: 2px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    /* Red top bar */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: #C8102E;
    }
    /* Crisis footer */
    .crisis {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0, 0, 0, 0.35);
      padding: 0.75rem 1rem;
      padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.45);
      text-align: center;
    }
    .crisis a {
      color: #C9A84C;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="logo">MCCS</div>
  <div class="sub">Camp Pendleton</div>
  <div class="icon">📡</div>
  <h1>You&rsquo;re Offline</h1>
  <p>Connect to the internet or base Wi-Fi to access MCCS programs and services.</p>
  <a href="/resident" class="btn">Try Again</a>

  <div class="crisis">
    Military / Veterans Crisis Line &nbsp;·&nbsp;
    <a href="tel:988">DIAL 988</a> then Press 1
  </div>
</body>
</html>
